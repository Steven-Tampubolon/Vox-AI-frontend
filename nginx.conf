server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Semua route non-file diarahkan ke index.html
    # supaya react-router-dom bisa handle client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}